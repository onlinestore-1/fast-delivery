<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
}

/* TOP BAR */
.top{
 display:flex;
 align-items:center;
 padding:10px;
 gap:10px;
 background:#2874f0;
 color:#fff;
}

.top input{
 flex:1;
 padding:10px;
 border:none;
 border-radius:20px;
}

/* RESULTS */
.suggestions{
 background:#fff;
}

.item{
 display:flex;
 align-items:center;
 gap:10px;
 padding:10px;
 border-bottom:1px solid #eee;
 cursor:pointer;
}

.item img{
 width:40px;
 height:40px;
 border-radius:6px;
 object-fit:cover;
}

.text p{
 margin:0;
 font-size:14px;
}

.text span{
 font-size:12px;
 color:#777;
}
</style>
</head>

<body>

<div class="top">
 <span onclick="history.back()">←</span>
 <input type="text" id="searchBox"
  placeholder="Search for Products, Brands and More"
  onkeyup="liveSearch(this.value)">
</div>

<div id="suggestions" class="suggestions"></div>

<script>

let products = JSON.parse(localStorage.getItem("allProducts")) || [];

/* 🔥 LIVE SEARCH (SMART FILTER) */
function liveSearch(value){

 value = value.toLowerCase().trim();

 if(value === ""){
   document.getElementById("suggestions").innerHTML = "";
   return;
 }

 let result = products.filter(p =>
   p.name.toLowerCase().includes(value) ||
   p.type.toLowerCase().includes(value)
 );

 showSuggestions(result);
}

/* 🔥 SHOW ONLY MATCHING PRODUCTS */
function showSuggestions(list){

 document.getElementById("suggestions").innerHTML =
  list.map(p=>`
   <div class="item" onclick="goResults('${p.type}','${p.name}')">

     <img src="${p.img}">

     <div class="text">
       <p>${p.name}</p>
       <span>in ${p.type}</span>
     </div>

   </div>
  `).join("");
}

/* 🔥 SAVE SEARCH + GO */
function goResults(type, keyword){

 localStorage.setItem("searchType", type);
 localStorage.setItem("searchKeyword", keyword);

 location.href = "results.html";
}

</script>

</body>
</html>
