<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta charset="UTF-8">
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  padding:10px;

  padding-top:70px; /* 🔥 IMPORTANT FIX */
}
 
.card{background:#fff;padding:15px;border-radius:6px}
input,button{width:100%;padding:10px;margin-bottom:10px}
button{background:#2874f0;color:#fff;border:none}

 /* TOP BAR */
.top-bar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#e6f2fb;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 10px;
  z-index:1000;
}

/* ICONS */
.top-bar i{
  font-size:20px;
  cursor:pointer;
  min-width:30px;
  text-align:center;
}

/* BOTTOM NAVBAR */
.bottom-nav{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-around;
 align-items:center;
 border-top:1px solid #ddd;
 z-index:1000;
}

.bottom-nav a{
 text-decoration:none;
 text-align:center;
 font-size:12px;
 color:#777;
}

.bottom-nav i{
 display:block;
 font-size:20px;
 margin-bottom:3px;
}

/* ACTIVE PAGE (BLUE) */
.bottom-nav .active{
 color:#2874f0;
 font-weight:bold;
}

/* PREVENT CONTENT HIDING */
body{
 padding-bottom:70px;
}

</style>
</head>

<body>

 <div class="top-bar">
  <i class="fa fa-arrow-left"onclick="goBack()"></i>
  <h3>Checkout</h3>
</div>

 <div class="card">

  <!-- ORDER PREVIEW -->
  <div id="orderPreview" style="margin-bottom:15px;"></div>

   <form onsubmit="saveOrder()" action="https://formsubmit.co/damasrphl2001@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="New Order">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <input name="name" placeholder="Full Name" required>
    <input name="phone" placeholder="Phone Number" required>
    <input name="address" placeholder="Delivery Address" required>

    <!-- hidden textarea for sending data -->
    <textarea name="order" id="order" hidden></textarea>

   <!-- ✅ HTTPS REDIRECT (VERY IMPORTANT) -->
    <input type="hidden" name="_next" value="https://www.jafar-otto.com/success.html">

    <button type="submit">Place Order</button>
  </form>

</div>

 <script>
const buy = JSON.parse(localStorage.getItem("buy"));

function formatPrice(price){
  return "TZS " + Number(price).toLocaleString() + "/=";
}

// CALCULATE TOTAL
const total = buy.price * buy.qty;

// BUILD ORDER PREVIEW (WITH IMAGE)
let previewHTML = `
  <h3>Order Summary</h3>

  <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
    <img src="${buy.img}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;">
    
    <div>
      <p><b>${buy.name}</b></p>
      <p>${formatPrice(buy.price)}</p>
    </div>
  </div>

  <p><b>Quantity:</b> ${buy.qty}</p>
`;

// ✅ SHOW SIZE ONLY IF EXISTS
if(buy.size){
  previewHTML += `<p><b>Size:</b> ${buy.size}</p>`;
}

// TOTAL
previewHTML += `<p><b>Total:</b> ${formatPrice(total)}</p>`;

// DISPLAY
document.getElementById("orderPreview").innerHTML = previewHTML;

// EMAIL TEXT
let orderText = `
Product: ${buy.name}
Price: ${formatPrice(buy.price)}
Quantity: ${buy.qty}
`;

if(buy.size){
  orderText += `Size: ${buy.size}\n`;
}

orderText += `Total: ${formatPrice(total)}`;

document.getElementById("order").value = orderText;

 function goBack(){
   window.history.back();
}

function saveOrder(){

  let item = JSON.parse(localStorage.getItem("buy"));

  if(!item) return;

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  orders.push({
    id: item.id,
    name: item.name,
    img: item.img,
    qty: item.qty,
    size: item.size || ""
  });

  localStorage.setItem("orders", JSON.stringify(orders));

  // OPTIONAL: clear current buy
  localStorage.removeItem("buy");
}

/* AUTO ACTIVE NAV */
function setActiveNav(){

  let path = window.location.pathname;

  if(path.includes("index.html") || path === "/" ){
    document.getElementById("nav-home").classList.add("active");
  }
  else if(path.includes("category") || path.includes("fashion")){
    document.getElementById("nav-category").classList.add("active");
  }
  else if(path.includes("account")){
    document.getElementById("nav-account").classList.add("active");
  }
  else if(path.includes("cart")){
    document.getElementById("nav-cart").classList.add("active");
  }
}

window.addEventListener("load", setActiveNav);
</script>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html" id="nav-home">
    <i class="fa fa-home"></i>
    Home
  </a>

  <a href="category.html" id="nav-category">
    <i class="fa fa-th-large"></i>
    Categories
  </a>

  <a href="account.html" id="nav-account">
    <i class="fa fa-user"></i>
    Account
  </a>

  <a href="cart.html" id="nav-cart">
    <i class="fa fa-shopping-cart"></i>
    Cart
  </a>

</div>

</body>
</html>
