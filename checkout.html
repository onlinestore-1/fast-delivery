<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta charset="UTF-8">
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  padding:10px;

  padding-top:70px; /* 🔥 IMPORTANT FIX */
}
 
.card{background:#fff;padding:15px;border-radius:6px}
input,button{width:100%;padding:10px;margin-bottom:10px}
button{background:#2874f0;color:#fff;border:none}

 /* TOP BAR */
.top-bar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#e6f2fb;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 10px;
  z-index:1000;
}

/* ICONS */
.top-bar i{
  font-size:20px;
  cursor:pointer;
  min-width:30px;
  text-align:center;
}

/* BOTTOM NAVBAR */
.bottom-nav{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-around;
 align-items:center;
 border-top:1px solid #ddd;
 z-index:1000;
}

.bottom-nav a{
 text-decoration:none;
 text-align:center;
 font-size:12px;
 color:#777;
}

.bottom-nav i{
 display:block;
 font-size:20px;
 margin-bottom:3px;
}

/* ACTIVE PAGE (BLUE) */
.bottom-nav .active{
 color:#2874f0;
 font-weight:bold;
}

/* PREVENT CONTENT HIDING */
body{
 padding-bottom:70px;
}

</style>
</head>

<body>

 <div class="top-bar">
  <i class="fa fa-arrow-left"onclick="goBack()"></i>
  <h3>Checkout</h3>
</div>

 <div class="card">

  <!-- ORDER PREVIEW -->
  <div id="orderPreview" style="margin-bottom:15px;"></div>

   <form onsubmit="saveOrder()" action="https://formsubmit.co/damasrphl2001@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="New Order">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <input name="name" placeholder="Full Name" required>
    <input name="phone" placeholder="Phone Number" required>
    <input name="address" placeholder="Delivery Address" required>

    <!-- hidden textarea for sending data -->
    <textarea name="order" id="order" hidden></textarea>

   <!-- ✅ HTTPS REDIRECT (VERY IMPORTANT) -->
    <input type="hidden" name="_next" value="https://www.jafar-otto.com/success.html">

    <button type="submit">Place Order</button>
  </form>

</div>

<script>
let buy = JSON.parse(localStorage.getItem("buy"));

function formatPrice(price){
  return "TZS " + Number(price).toLocaleString() + "/=";
}

let total = 0;
let previewHTML = `<h3>Order Summary</h3>`;
let orderText = "";

/* ✅ HANDLE MULTIPLE OR SINGLE PRODUCT */
if(Array.isArray(buy)){

  buy.forEach(item => {

    let itemTotal = item.price * item.qty;
    total += itemTotal;

    previewHTML += `
      <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;">
        <img src="${item.img}" style="width:80px;height:80px;border-radius:6px;object-fit:cover;">
        
        <div>
          <b>${item.name}</b>
          <p>${formatPrice(item.price)}</p>
          <p>Qty: ${item.qty}</p>
          ${item.size ? `<p>Size: ${item.size}</p>` : ""}
        </div>
      </div>
      <hr>
    `;

    orderText += `
Product: ${item.name}
Price: ${formatPrice(item.price)}
Quantity: ${item.qty}
${item.size ? "Size: " + item.size : ""}
-------------------
    `;
  });

}else{
  /* SINGLE PRODUCT (BUY NOW) */

  total = buy.price * buy.qty;

  previewHTML += `
    <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;">
      <img src="${buy.img}" style="width:80px;height:80px;border-radius:6px;object-fit:cover;">
      
      <div>
        <b>${buy.name}</b>
        <p>${formatPrice(buy.price)}</p>
        <p>Qty: ${buy.qty}</p>
        ${buy.size ? `<p>Size: ${buy.size}</p>` : ""}
      </div>
    </div>
    <hr>
  `;

  orderText += `
Product: ${buy.name}
Price: ${formatPrice(buy.price)}
Quantity: ${buy.qty}
${buy.size ? "Size: " + buy.size : ""}
-------------------
  `;
}

/* ✅ FINAL TOTAL */
previewHTML += `<h3>Total: ${formatPrice(total)}</h3>`;
orderText += `\nTOTAL AMOUNT: ${formatPrice(total)}`;

/* DISPLAY */
document.getElementById("orderPreview").innerHTML = previewHTML;
document.getElementById("order").value = orderText;

/* SAVE ORDER */
function saveOrder(){

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  if(Array.isArray(buy)){
    buy.forEach(item=>{
      orders.push(item);
    });
  }else{
    orders.push(buy);
  }

  localStorage.setItem("orders", JSON.stringify(orders));

  localStorage.removeItem("buy");
}

function goBack(){
  window.history.back();
}

/* AUTO ACTIVE NAV */
function setActiveNav(){

  let path = window.location.pathname;

  if(path.includes("index.html") || path === "/" ){
    document.getElementById("nav-home").classList.add("active");
  }
  else if(path.includes("category") || path.includes("fashion")){
    document.getElementById("nav-category").classList.add("active");
  }
  else if(path.includes("account")){
    document.getElementById("nav-account").classList.add("active");
  }
  else if(path.includes("cart")){
    document.getElementById("nav-cart").classList.add("active");
  }
}

window.addEventListener("load", setActiveNav);
</script>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html" id="nav-home">
    <i class="fa fa-home"></i>
    Home
  </a>

  <a href="category.html" id="nav-category">
    <i class="fa fa-th-large"></i>
    Categories
  </a>

  <a href="account.html" id="nav-account">
    <i class="fa fa-user"></i>
    Account
  </a>

  <a href="cart.html" id="nav-cart">
    <i class="fa fa-shopping-cart"></i>
    Cart
  </a>

</div>

</body>
</html>
