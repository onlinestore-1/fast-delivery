<!DOCTYPE html>
<html>
<head>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta charset="UTF-8">
<title>Home uses</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
 body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP */
 .topbar{
 display:flex;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:10px;
 color:white;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

/* SLIDER */
.slider img{width:100%;display:none}
.slider img:first-child{display:block}

/* CATEGORY GRID */
.grid3{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
 padding:10px
}
.cat{
 background:#fff;
 padding:10px;
 text-align:center;
 border-radius:6px;
 cursor:pointer
}
.cat img{width:100%;height:90px;object-fit:cover}

 /* TOP DEALS SECTION */
.deal-title{
  background: linear-gradient(180deg, #f05474, #e94363);
  color:white;
  padding:10px;
  margin:0;
  border-left:6px solid #2874f0;
}

.deal-wrapper{
  background: linear-gradient(180deg, #f05474, #e94363);
  padding:10px;
}

.deal-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.deal-card{
  background:#fff;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
}

.deal-card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

/* PRODUCTS */
.grid2{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px
}
.card img{width:100%}

 /* BOTTOM NAVBAR */
.bottom-nav{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-around;
 align-items:center;
 border-top:1px solid #ddd;
 z-index:1000;
}

.bottom-nav a{
 text-decoration:none;
 text-align:center;
 font-size:12px;
 color:#777;
}

.bottom-nav i{
 display:block;
 font-size:20px;
 margin-bottom:3px;
}

/* ACTIVE PAGE (BLUE) */
.bottom-nav .active{
 color:#2874f0;
 font-weight:bold;
}

/* PREVENT CONTENT HIDING */
body{
 padding-bottom:70px;
}
</style>
</head>

<body>

  <div class="topbar">
 <input type="search" placeholder="Search fashion..." onkeyup="search(this.value)">
 <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

<!-- ADS -->
<div class="slider">
 <img src="https://i.imgur.com/j6JWI5n.png">
 <img src="https://i.imgur.com/3ZFgqAY.png">
 <img src="https://i.imgur.com/M4bTgH1.png">
</div>

<h3 style="padding:10px">Muhimu Categories</h3>

<div class="grid3">
 <div class="cat" onclick="openType('sabuni')"><img src="https://i.postimg.cc/52JB1cfY/muh7.jpg"><p>Sabuni</p></div>
 <div class="cat" onclick="openType('book')"><img src="https://i.postimg.cc/pT5hzkP0/muh1.jpg"><p>Madaftari</p></div>
 <div class="cat" onclick="openType('tooth')"><img src="https://i.postimg.cc/2547hzTB/a1.jpg"><p>Dawa ya meno</p></div>
 <div class="cat" onclick="openType('oil')"><img src="https://i.postimg.cc/2SkSqgjJ/a20.jpg"><p>Mafuta</p></div>
 <div class="cat" onclick="openType('kids')"><img src="https://i.postimg.cc/nrssK2Z0/kia10.jpg"><p>Kids Shoes</p></div>
 <div class="cat" onclick="openType('ziada')"><img src="https://i.postimg.cc/T3PPnQ92/crocs2.jpg"><p>Ziada</p></div>
</div>

 <h3 class="deal-title">Top Deals Of The Week</h3>

<div class="deal-wrapper">
  <div class="deal-grid" id="topDeals"></div>
</div>

<h3 style="padding:10px">Suggested For You</h3>
<div class="grid2" id="suggested"></div>

<h3 style="padding:10px">You May Also Like</h3>
<div class="grid2" id="like"></div>

<script>
/* SLIDER */
let s=0;
setInterval(()=>{
 let imgs=document.querySelectorAll(".slider img");
 imgs.forEach(i=>i.style.display="none");
 s=(s+1)%imgs.length;
 imgs[s].style.display="block";
},3000);

/* FASHION DATA */
const fashion=[
 {id:200,name:"Doffi",price:12,img:"https://i.imgur.com/wpJjs0L.jpeg",type:"sabuni"},
 {id:201,name:"OMO",price:18,img:"https://i.imgur.com/v0eeorr.jpeg",type:"sabuni",desc:"Ondoa madoa sugu"},
 {id:202,name:"Doffi",price:17,img:"https://i.imgur.com/hD9g7L2.jpeg/200",desc:"Washing powder"},
 {id:203,name:"Niceone",price:18,img:"https://i.imgur.com/7nmPGbq.jpeg/200",type:"sabuni",desc:"Ondoa madoa sugu"},
 {id:204,name:"Jet",price:19,img:"https://i.imgur.com/OoGiHtj.jpeg",type:"sabuni",desc:"Dish washing liquid soap"},
 {id:205,name:"Jet",price:18,img:"https://i.imgur.com/q36RjQ2.jpeg",type:"sabuni",desc:"Dish washing liquid soap"},
 {id:206,name:"Freedom Counter Book",price:14,img:"https://i.postimg.cc/50JG0SpM/free1.jpg",type:"book",desc:"Freedom Counter Book-2 Quire"},
 {id:207,name:"Vaseline",price:25,img:"https://i.postimg.cc/TY2znxmq/a21.jpg",type:"oil",desc:"Vaseline Petroleum Jelly"},
 {id:208,name:"Exercise Book",price:19,img:"https://i.imgur.com/AQrSAGW.jpeg/200",type:"book",desc:"Daftari mistali mikubwa na midogo"},
 {id:209,name:"Exercise Book",price:19,img:"https://i.imgur.com/ihIcg3h.jpeg/200",type:"book",desc:"Daftari la kuandikia page 100"},
 {id:210,name:"Exercise Book",price:17,img:"https://i.imgur.com/Hg8Aeea.jpeg/200",type:"book",desc:"Daftari la kuandikia page 32"},
 {id:211,name:"Sneakers",price:40,img:"https://i.postimg.cc/XqdgtpTs/a17.jpg",type:"kids"},
 {id:212,name:"Colgate",price:17,img:"https://i.postimg.cc/2547hzTB/a1.jpg/200",type:"tooth",desc:"With The Cool Mint Flavour"},
 {id:213,name:"Crocs",price:17,img:"https://i.postimg.cc/T3PPnQ92/crocs2.jpg/200",type:"ziada",desc:"Crocs"},
 {id:214,name:"Shoes",price:17,img:"https://i.postimg.cc/gJh5cB3N/a15.jpg/200",type:"kids",desc:"Viatu vya watoto wadogo"},
 {id:215,name:"Shoes",price:17,img:"https://i.postimg.cc/kGncrjsW/a16.jpg/200",type:"kids",desc:"Viatu vya watoto wadogo"},
 {id:216,name:"Shoes",price:17,img:"https://i.postimg.cc/sxXh9bws/a13.jpg/200",type:"kids",desc:"Viatu vya watoto wadogo"},
 {id:217,name:"Herbal",price:17,img:"https://i.postimg.cc/2SkSqgjJ/a20.jpg/200",type:"oil",desc:"Herbal Petroleum Jelly"},
 {id:218,name:"BodyLuxe",price:17,img:"https://i.postimg.cc/ydVMnC52/a19.jpg/200",type:"oil",desc:"BodyLuxe Petroleum Jelly"},
 {id:219,name:"VESTLINE",price:17,img:"https://i.imgur.com/I9zrvTV.jpeg/200",type:"oil",desc:"Vestline Pure Petroleum Jelly"},
 {id:220,name:"Whitedent",price:17,img:"https://i.imgur.com/U3VDK5W.jpeg/200",type:"tooth",desc:"Whitedent Herbal"}
];

 /* TOP DEALS DATA */
const topDeals = [
 {id:217,name:"Herbal",price:17,img:"https://i.postimg.cc/2SkSqgjJ/a20.jpg/200",type:"oil",desc:"Herbal Petroleum Jelly"},
 {id:202,name:"Doffi",price:17,img:"https://i.imgur.com/hD9g7L2.jpeg/200",desc:"Washing powder"},
 {id:210,name:"Exercise Book",price:17,img:"https://i.imgur.com/Hg8Aeea.jpeg/200",type:"book",desc:"Daftari la kuandikia page 32"},
 {id:205,name:"Jet",price:18,img:"https://i.imgur.com/q36RjQ2.jpeg",type:"sabuni",desc:"Dish washing liquid soap"}
];

/* MERGE INTO allProducts */
let allProducts = JSON.parse(localStorage.getItem("allProducts")) || [];

topDeals.forEach(d=>{
 if(!allProducts.some(p=>p.id===d.id)){
   allProducts.push(d);
 }
});

localStorage.setItem("allProducts", JSON.stringify(allProducts));

/* FORMAT PRICE */
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString() + "/=";
}

/* DRAW TOP DEALS */
document.getElementById("topDeals").innerHTML =
 topDeals.map(p=>`
  <div class="deal-card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");

/* OPEN PRODUCT */
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href="product.html";
}

localStorage.setItem("allProducts",JSON.stringify(fashion));

 function formatPrice(price){
  return "TZS " + Number(price).toLocaleString() + "/=";
}

function draw(list,id){
 document.getElementById(id).innerHTML=list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>`).join("");
}

draw(fashion.slice(0,2),"suggested");
draw(fashion.slice(1),"like");

function openType(t){
 localStorage.setItem("fashionType",t);
 location.href="fashion-list.html";
}

function openProduct(id){
 localStorage.setItem("pid",id);
 location.href="product.html";
}

function search(v){
 draw(fashion.filter(p=>p.name.toLowerCase().includes(v.toLowerCase())),"suggested");
}

 /* AUTO ACTIVE NAV */
function setActiveNav(){

  let path = window.location.pathname;

  if(path.includes("index.html") || path === "/" ){
    document.getElementById("nav-home").classList.add("active");
  }
  else if(path.includes("category") || path.includes("fashion")){
    document.getElementById("nav-category").classList.add("active");
  }
  else if(path.includes("account")){
    document.getElementById("nav-account").classList.add("active");
  }
  else if(path.includes("cart")){
    document.getElementById("nav-cart").classList.add("active");
  }
}

window.addEventListener("load", setActiveNav);
</script>

 <!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html" id="nav-home">
    <i class="fa fa-home"></i>
    Home
  </a>

  <a href="category.html" id="nav-category">
    <i class="fa fa-th-large"></i>
    Categories
  </a>

  <a href="account.html" id="nav-account">
    <i class="fa fa-user"></i>
    Account
  </a>

  <a href="cart.html" id="nav-cart">
    <i class="fa fa-shopping-cart"></i>
    Cart
  </a>

</div>

</body>
</html>
