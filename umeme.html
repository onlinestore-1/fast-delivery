<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wireless</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:60px;
}

/* TOP BAR */
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:white;
 padding:12px 10px;
 color:black;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}

/* LEFT SIDE */
.back-area{
 display:flex;
 align-items:center;
 gap:6px;
 cursor:pointer;
 font-size:15px;
 font-weight:bold;
}

.back-arrow{
 font-size:22px;
}

/* RIGHT SIDE */
.top-icons{
 display:flex;
 align-items:center;
 gap:18px;
}

.icon{
 font-size:22px;
 cursor:pointer;
}

/* HEADING */
.page-title{
 padding:4px 10px 2px;
 margin:0;
 font-size:22px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:4px 10px 10px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}

.card img{
 width:100%;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

 <!-- LEFT -->
 <div class="back-area" onclick="location.href='index.html'">
  <span class="back-arrow">←</span>
  <span>Continue Shopping</span>
 </div>

 <!-- RIGHT -->
 <div class="top-icons">
  <span class="icon" onclick="location.href='search.html'">🔍</span>
  <span class="icon" onclick="location.href='cart.html'">🛒</span>
 </div>

</div>

<h2 class="page-title">Wireless</h2>

<div id="box" class="grid"></div>

<script>
const speakers = [ 
 {id:400,name:"Smart Watches",price:5000,img:"https://i.imgur.com/yIsxgJk.jpeg",type:"watches",desc:"Smart Watch for Men 50M Waterproof"},
 {id:401,name:"SanDisk",price:33000,img:"https://i.imgur.com/p4TuNyK.jpeg",type:"data",desc:"SanDisk Ultra Shift 32GB"},
 {id:402,name:"Goboult",price:34000,img:"https://i.imgur.com/d23TMP5.jpeg",type:"power",desc:"10000 mAH 22.5 W Power Bank"},
 {id:403,name:"HG WORLD PS4 Controller",price:30000,img:"https://i.imgur.com/ADKZfyn.jpeg",type:"pad",desc:"HG WORLD PS4 Controller DualShock 4 wireless"},
 {id:404,name:"HP Laptop 4540s",price:390000,img:"https://i.imgur.com/S7hlTgj.jpeg",type:"laptop",desc:"HP ProBook 4540s 4GB Intel i3 HDD 500GB"},
 {id:405,name:"HP Laptop 4530s",price:360000,img:"https://i.imgur.com/Y5W6m6J.jpeg",type:"laptop",desc:"HP ProBook 4530s 8GB Intel i5 HDD 500GB"},
 {id:406,name:"Pods",price:17000,img:"https://i.imgur.com/bSBbTan.jpeg",type:"charger",desc:"Swiss Pods Bluetooth Headset"},
 {id:407,name:"Mini Boost",price:10000,img:"https://i.postimg.cc/j2H3TfLz/aa85.jpg",type:"power",desc:"Small Bluetooth Speaker"},
 {id:408,name:"ZEBRONICS Astra",price:25500,img:"https://i.postimg.cc/rFyNs3Hv/aa81.jpg",type:"power",desc:"Portable Bluetooth Speaker"},
 {id:409,name:"Small Speaker purple",price:10000,img:"https://i.postimg.cc/DwMMYkjL/aa86.jpg",type:"power",desc:"Small Bluetooth Speaker"},
 {id:410,name:"ZEBRONICS Sound",price:30000,img:"https://i.postimg.cc/FsQsxQm4/aa83.jpg",type:"power",desc:"Zebronics Sound Feast50"},
 {id:411,name:"Motorola Moto",price:170000,img:"https://i.postimg.cc/nL965CYk/a37.jpg",type:"charger",desc:"Buds Loop TWS"},
 {id:412,name:"Smart Watches Orange",price:26000,img:"https://i.postimg.cc/d0KnGnNk/a41.jpg",type:"watches",desc:"Ulta Max Smart Watch"},
 {id:413,name:"Smart Watches Black",price:26000,img:"https://i.postimg.cc/XvH8t3Nt/a42.jpg",type:"watches",desc:"Black Ulta Max Smart Watch"},
 {id:414,name:"Smart Watches Metal Black",price:30000,img:"https://i.postimg.cc/PfmDwTsw/a40.jpg",type:"watches",desc:"Max Smart Watch"},
 {id:415,name:"Smart Watches",price:5000,img:"https://i.postimg.cc/c1mHWHGB/b10.jpg",type:"watches",desc:"Best Max Smart Watch"},
 {id:416,name:"Smart Watches",price:10000,img:"https://i.postimg.cc/QtSr2FKD/b12.jpg",type:"watches",desc:"Ulta Max Smart Watch"},
 {id:417,name:"Bestor RGB",price:30000,img:"https://i.postimg.cc/DZHLrP7K/a44.jpg",type:"charger",desc:"Bestor rgb wired Gaming Headset"},
 {id:418,name:"PunnkFunnk",price:27500,img:"https://i.postimg.cc/T1k8N1H2/a45.jpg",type:"charger",desc:"PunkFunnk BattleKiller"},
 {id:419,name:"Lexolt Astra",price:15000,img:"https://i.postimg.cc/3RnbY6j4/a46.jpg",type:"charger",desc:"Lexolt Astra 45ms"}
];

// FORMAT PRICE
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString();
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY PRODUCTS
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
