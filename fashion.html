<!DOCTYPE html>

<style>
 body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP */
 .topbar{
 display:flex;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:10px;
 color:white;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

/* SLIDER */
.slider img{width:100%;display:none}
.slider img:first-child{display:block}

/* CATEGORY GRID */
.grid3{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:10px;
 padding:10px
}
.cat{
 background:#fff;
 padding:10px;
 text-align:center;
 border-radius:6px;
 cursor:pointer
}
.cat img{width:100%;height:90px;object-fit:cover}

/* TOP DEALS SECTION */
.deal-title{
  background:#dfe8f4;
  color:black;
  padding:10px;
  margin:0;
  border-left:6px solid #2874f0;
}

.deal-wrapper{
  background:#dfe8f4;
  padding:10px;
}

.deal-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.deal-card{
  background:#fff;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
}

.deal-card img{
  width:100%;
  height:140px;
  object-fit:cover;
} 

/* PRODUCTS */
.grid2{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px
}
.card img{width:100%}

 /* BOTTOM NAVBAR */
.bottom-nav{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-around;
 align-items:center;
 border-top:1px solid #ddd;
 z-index:1000;
}

.bottom-nav div{
 text-align:center;
 font-size:12px;
 color:#777;
 cursor:pointer;
}

.bottom-nav i{
 display:block;
 font-size:20px;
 margin-bottom:3px;
}

/* ACTIVE (BLUE LIKE IMAGE) */
.bottom-nav .active{
 color:#2874f0;
}
</style>
</head>

 let allProducts = JSON.parse(localStorage.getItem("allProducts")) || [];

// Merge without duplicates
topDeals.forEach(d=>{
 if(!allProducts.some(p=>p.id===d.id)){
   allProducts.push(d);
 }
});

localStorage.setItem("allProducts", JSON.stringify(allProducts));

localStorage.setItem("allProducts",JSON.stringify(fashion));

 function formatPrice(price){
  return "TZS " + Number(price).toLocaleString() + "/=";
}

function draw(list,id){
 document.getElementById(id).innerHTML=list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>`).join("");
}

 function drawTopDeals(){
 document.getElementById("topDeals").innerHTML =
  topDeals.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>TZS ${Number(p.price).toLocaleString()}/=</b>
   </div>
  `).join("");
}

drawTopDeals();

draw(fashion.slice(0,2),"suggested");
draw(fashion.slice(1),"like");

function openType(t){
 localStorage.setItem("fashionType",t);
 location.href="fashion-list.html";
}

function openProduct(id){
 localStorage.setItem("pid",id);
 location.href="product.html";
}

function search(v){
 draw(fashion.filter(p=>p.name.toLowerCase().includes(v.toLowerCase())),"suggested");
}

 function goPage(page){
  location.href = page;
}

/* SET ACTIVE PAGE (BLUE COLOR) */
function setActiveNav(){

  let path = window.location.pathname;

  if(path.includes("index.html") || path === "/"){
    document.getElementById("nav-home").classList.add("active");
  }
  else if(path.includes("category")){
    document.getElementById("nav-category").classList.add("active");
  }
  else if(path.includes("account")){
    document.getElementById("nav-account").classList.add("active");
  }
  else if(path.includes("cart")){
    document.getElementById("nav-cart").classList.add("active");
  }

}

window.addEventListener("load", setActiveNav);
