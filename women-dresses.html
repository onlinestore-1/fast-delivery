<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gloves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:10px;
 color:white;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

  box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}
.card img{width:100%}
</style>
</head>

<body>

<!-- SEARCH + CART -->
<div class="topbar">
 <input type="search" placeholder="Search products..." onkeyup="search(this.value)">
 <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

<h2 style="padding:10px">Gloves</h2>
<div id="box" class="grid"></div>

<script>
const speakers = [
 {id:18,name:"Indian Garage Co",price:32000,img:"https://i.imgur.com/fJconnx.jpeg",type:"jeans",desc:"Slim Fit Flat-Front Cargo Trousers"},
 {id:19,name:"Dnmx for trends select",price:33000,img:"https://i.imgur.com/2JaAcgr.jpeg",type:"jeans",desc:"Slim Fit Flat-Front Cargo Trousers"},
 {id:20,name:"ECKO UNLTD",price:82500,img:"https://i.imgur.com/R3ZrzPW.jpeg",type:"jeans",desc:"Slim Fit Flat-Front Cargo Pants"},
 {id:21,name:"STUDIO NEXX",price:74000,img:"https://i.imgur.com/8E1PQNH.jpeg",type:"jeans",desc:"Straight Fit Cargo Pants"}
];

// FORMAT PRICE (TZS + comma)
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString() + "/=";
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY FUNCTION
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// SEARCH FUNCTION
function search(value){
 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );
 draw(filtered);
}

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
