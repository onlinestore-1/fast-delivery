<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wireless</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="favicon.png">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:60px;
}

/* TOP BAR */
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:white;
 padding:12px 10px;
 color:black;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}

/* LEFT SIDE */
.back-area{
 display:flex;
 align-items:center;
 gap:6px;
 cursor:pointer;
 font-size:15px;
 font-weight:bold;
}

.back-arrow{
 font-size:22px;
}

/* RIGHT SIDE */
.top-icons{
 display:flex;
 align-items:center;
 gap:18px;
}

.icon{
 font-size:22px;
 cursor:pointer;
}

/* HEADING */
.page-title{
 padding:4px 10px 2px;
 margin:0;
 font-size:22px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:4px 10px 10px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}

.card img{
 width:100%;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

 <!-- LEFT -->
 <div class="back-area" onclick="location.href='index.html'">
  <span class="back-arrow">←</span>
  <span>Continue Shopping</span>
 </div>

 <!-- RIGHT -->
 <div class="top-icons">
  <span class="icon" onclick="location.href='search.html'">🔍</span>
  <span class="icon" onclick="location.href='cart.html'">🛒</span>
 </div>

</div>

<h2 class="page-title">Buy Here Gloves</h2>

<div id="box" class="grid"></div>

<script>
// FORMAT DELIVERY DATE
function getDeliveryDate(days = 7){

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  const daysName = [
    "Sun","Mon","Tue","Wed","Thu","Fri","Sat"
  ];

  let date = new Date();

  // add days automatically
  date.setDate(date.getDate() + days);

  let day = date.getDate();
  let month = months[date.getMonth()];
  let weekDay = daysName[date.getDay()];

  return `Delivery by ${day} ${month}, ${weekDay}`;
}
const speakers = [
 {id:25,name:"Riding Gloves",price:12000,img:"https://i.imgur.com/bdRBRBf.jpeg",type:"gloves",desc:"Riding Gloves",delivery:getDeliveryDate()},
 {id:23,name:"Gloves ZaySoo",price:13000,img:"https://i.imgur.com/bnxAhsJ.jpeg",type:"gloves",desc:"ZaySoo Anti-Slip Gym  Gloves for Professional Weightlifting,fitness Training and workout",delivery:getDeliveryDate()},
 {id:24,name:"Gloves Adidas",price:15000,img:"https://i.imgur.com/SEkRfCe.jpeg",type:"gloves",desc:"Adidas Essential Training Gloves",delivery:getDeliveryDate()}
];

// FORMAT PRICE
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString();
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY PRODUCTS
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
