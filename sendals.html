<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gloves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:10px;
 color:white;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

 .title{
 flex:1;
 font-size:16px;
 font-weight:bold;
}

/* SMALL GAP */
.section-title{
 padding:6px 10px;
 margin:0;
 font-size:18px;
}

/* THIS PRODUCT (2 COLUMN) */
.two-grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

/* HORIZONTAL SCROLL ROW */
.scroll-row{
 display:flex;
 overflow-x:auto;
 gap:12px;
 padding:10px;
}
.scroll-row::-webkit-scrollbar{
 display:none;
}

.scroll-card{
 min-width:130px;
 max-width:130px;
 background:#fff;
 border-radius:8px;
 padding:8px;
 flex-shrink:0;
 text-align:center;
}

.scroll-card img{
 width:100%;
 height:100px;
 object-fit:cover;
 border-radius:6px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}
.card img{width:100%}
</style>
</head>

<body>

<!-- SEARCH + CART -->
 <div class="topbar">
  <span onclick="history.back()" style="font-size:22px;cursor:pointer;">←</span>

  <h3 class="title">Continue Your Shopping</h3>

  <span style="font-size:20px;cursor:pointer;" onclick="location.href='search.html'">🔍</span>
  <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

 <!-- THIS PRODUCT -->
<h3 class="section-title">This Product</h3>
<div id="thisProduct" class="two-grid"></div>

 <script>
const speakers = [
 {id:108,name:"Ballcone",price:1800,img:"https://i.imgur.com/YU7yVMc.jpeg/200",type:"cream",desc:"Ballcone flavoured ice cream"},
 {id:106,name:"Kahawa",price:500,img:"https://i.postimg.cc/fTQhRQTC/ab10.jpg/200",type:"cream",desc:"Kahawa Toffee & Cappuccino"},
 {id:107,name:"Bungo",price:500,img:"https://i.postimg.cc/prYcd7qF/ab11.jpg/200",type:"cream",desc:"Azam ice lolly"},
 {id:109,name:"Embe DODO",price:500,img:"https://i.postimg.cc/7ZpdPpkp/ab14.jpg/200",type:"cream",desc:"Flavoured ice lolly"},
 {id:110,name:"Strawberry",price:500,img:"https://i.postimg.cc/Y9tXh7yP/ab12.jpg/200",type:"cream",desc:"Strawberry sherbet milk bar"},
 {id:111,name:"Ukwaju",price:500,img:"https://i.postimg.cc/xCsP8zmq/ab9.jpg/200",type:"cream",desc:"Ukwaju ice lOlly"},
 {id:112,name:"Coca Cola(600ml)",price:1000,img:"https://i.imgur.com/UYZ1dIH.jpeg/200",type:"drinks",desc:"Coca Cola"},
 {id:113,name:"pepsi(600ml)",price:1000,img:"https://i.imgur.com/cGRn5OZ.jpeg/200",type:"drinks",desc:"pepsi"},
 {id:114,name:"Afya Maji(1.6L)",price:1000,img:"https://i.imgur.com/u9dkajs.jpeg/200",type:"drinks",desc:"Afya maji ya kunywa"},
 {id:115,name:"u-fresh orange(330ml)",price:500,img:"https://i.imgur.com/k42X2gl.jpeg/200",type:"drinks",desc:"u-fresh orange"},
 {id:116,name:"u-fresh power(330ml)",price:500,img:"https://i.imgur.com/y1qJelw.jpeg/200",type:"drinks",desc:"u-fresh power"},
 {id:117,name:"u-fresh pineapple(330ml)",price:500,img:"https://i.imgur.com/GcVEME3.jpeg/200",type:"drinks",desc:"u-fresh pineapple"},
 {id:118,name:"u-fresh passion(330ml)",price:500,img:"https://i.imgur.com/9uhn4hj.jpeg/200",type:"drinks",desc:"u-fresh passion"},
 {id:119,name:"u-fresh cola(330ml)",price:500,img:"https://i.imgur.com/FvMtoAL.jpeg/200",type:"drinks",desc:"u-fresh cola"}
];

// FORMAT PRICE
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString() + "/=";
}

// DRAW PRODUCTS
function drawThisProduct(){

 document.getElementById("thisProduct").innerHTML =
  speakers.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>${formatPrice(p.price)}</b>
   </div>
  `).join("");
}

// SEARCH FUNCTION
function search(value){

 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );

 document.getElementById("thisProduct").innerHTML =
  filtered.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>${formatPrice(p.price)}</b>
   </div>
  `).join("");
}

// OPEN PRODUCT PAGE
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}

// LOAD PRODUCTS
drawThisProduct();
</script>

</body>
</html>
