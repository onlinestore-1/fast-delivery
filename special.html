<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gloves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:white;
 padding:10px;
 color:black;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

 .title{
 flex:1;
 font-size:16px;
 font-weight:bold;
}

/* SMALL GAP */
.section-title{
 padding:6px 10px;
 margin:0;
 font-size:18px;
}

/* THIS PRODUCT (2 COLUMN) */
.two-grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

/* HORIZONTAL SCROLL ROW */
.scroll-row{
 display:flex;
 overflow-x:auto;
 gap:12px;
 padding:10px;
}
.scroll-row::-webkit-scrollbar{
 display:none;
}

.scroll-card{
 min-width:130px;
 max-width:130px;
 background:#fff;
 border-radius:8px;
 padding:8px;
 flex-shrink:0;
 text-align:center;
}

.scroll-card img{
 width:100%;
 height:100px;
 object-fit:cover;
 border-radius:6px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}
.card img{width:100%}
</style>
</head>

<body>

<!-- SEARCH + CART -->
 <div class="topbar">
  <span onclick="history.back()" style="font-size:22px;cursor:pointer;">←</span>

  <h3 class="title">Continue Your Shopping</h3>

  <span style="font-size:20px;cursor:pointer;" onclick="location.href='search.html'">🔍</span>
  <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

 <!-- THIS PRODUCT -->
<h3 class="section-title">This Product</h3>
<div id="thisProduct" class="two-grid"></div>

<!-- SIMILAR PRODUCTS -->
<h3 class="section-title">Similar Products</h3>
<div id="similar" class="scroll-row"></div>

<!-- EXPLORE SIMILAR TRENDS -->
<h3 class="section-title">Explore Similar Trends</h3>
<div id="trending" class="scroll-row"></div>

<script>
const speakers = [
 {id:49,name:"Clogs sandal Navy",price:15000,img:"https://i.postimg.cc/PqJw0wRc/a49.jpg",type:"sports",desc:"Navy Back Strap Clogs"},
 {id:50,name:"Red Tape",price:13000,img:"https://i.postimg.cc/tRMmc3vD/a53.jpg",type:"sports",desc:"Red Tape Clogs"},
 {id:39,name:"Zara Brown",price:32000,img:"https://i.postimg.cc/dVWyHGSG/ab16.jpg",type:"sports",desc:"Brown leather Zara Sandals"},
 {id:40,name:"Zara Leather Black",price:32000,img:"https://i.postimg.cc/tTss7TyS/ab18.jpg",type:"sports",desc:"Black Leather Zara Comfortable Cross"},
 {id:41,name:"Brown Leather",price:20000,img:"https://i.postimg.cc/VsD4Q0Ty/ab17.jpg",type:"sports",desc:"Brown leather Slides"},
 {id:42,name:"Prada black",price:20000,img:"https://i.postimg.cc/7LD1CSQm/ab19.jpg",type:"sports",desc:"Prada black patent leather sandals"},
 {id:43,name:"Black Fendi",price:10000,img:"https://i.postimg.cc/G3xvNXzv/ab23.jpg",type:"sports",desc:"Black Fendi Women sandals"},
 {id:44,name:"Brown Mosssimo",price:28000,img:"https://i.postimg.cc/7ht3R6Dk/ab24.jpg",type:"sports",desc:"Mossimo sandals with a crisscross strap"},
 {id:45,name:"Gold Modish Slides",price:15000,img:"https://i.postimg.cc/9M8b61Yz/ab25.jpg",type:"sports",desc:"Gold Modish Slides Sendals"},
 {id:46,name:"Burberry black Canvas",price:15000,img:"https://i.postimg.cc/sD6B5qDs/ab26.jpg",type:"sports",desc:"Burberry canvas and leather Honour sandals"},
 {id:51,name:"Red Tape Grey",price:12000,img:"https://i.postimg.cc/1tNJhTjM/a55.jpg",type:"sports",desc:"Kapani Fashion Flipflops,Slipper"},
 {id:52,name:"Slip On Clogs navy",price:12000,img:"https://i.postimg.cc/VLSGjJgL/a54.jpg",type:"sports",desc:"Casual Slip On Clogs"},
 {id:53,name:"Stylish Clogs Black",price:12000,img:"https://i.postimg.cc/7607HyMc/a56.jpg",type:"sports",desc:"Stylish Slip On Clogs"},
 {id:54,name:"Wugatti",price:22000,img:"https://i.postimg.cc/sf0yjZ1Q/a58.jpg",type:"sports",desc:"Wugatti Comfort Sendals"}
];

// FORMAT PRICE (TZS + comma)
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString() + "/=";
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

 function drawThisProduct(){
 let selected = speakers.slice(0,2);

 document.getElementById("thisProduct").innerHTML =
  selected.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>${formatPrice(p.price)}</b>
   </div>
  `).join("");
}

 let similarIds = []; // store IDs used in Similar

function drawSimilar(){

  // shuffle all products
  let shuffled = [...speakers].sort(()=>0.5 - Math.random());

  // pick 7
  let selected = shuffled.slice(0,7);

  // store their IDs
  similarIds = selected.map(p => p.id);

  document.getElementById("similar").innerHTML =
    selected.map(p=>`
      <div class="scroll-card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <p>${p.name}</p>
        <b>${formatPrice(p.price)}</b>
      </div>
    `).join("");
}


function drawTrending(){

  // ❌ REMOVE products already used in Similar
  let remaining = speakers.filter(p => !similarIds.includes(p.id));

  // shuffle remaining only
  let shuffled = [...remaining].sort(()=>0.5 - Math.random());

  // pick 6
  let selected = shuffled.slice(0,6);

  document.getElementById("trending").innerHTML =
    selected.map(p=>`
      <div class="scroll-card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <p>${p.name}</p>
        <b>${formatPrice(p.price)}</b>
      </div>
    `).join("");
}

// SEARCH FUNCTION
function search(value){
 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );
 draw(filtered);
}

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}

drawThisProduct();
drawSimilar();
drawTrending();

/* AUTO UPDATE */
 setInterval(()=>{
 drawSimilar();   // must run first
 drawTrending();  // uses filtered data
},60000);
</script>

</body>
</html>
