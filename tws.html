<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wireless</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:60px; /* reduced top spacing */
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:10px;
 color:white;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}

.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}

.cart{
 font-size:22px;
 cursor:pointer;
}

/* HEADING */
.page-title{
 padding:4px 10px 2px; /* very small space */
 margin:0;
 font-size:22px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:4px 10px 10px; /* smaller top space */
}

.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}

.card img{
 width:100%;
}
</style>
</head>

<body>

<!-- SEARCH + CART -->
<div class="topbar">
 <input type="search" placeholder="Search products..." onkeyup="search(this.value)">
 <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

<h2 class="page-title">Ear phone & pods</h2>

<div id="box" class="grid"></div>

<script>
// FORMAT DELIVERY DATE
function getDeliveryDate(days = 7){

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  const daysName = [
    "Sun","Mon","Tue","Wed","Thu","Fri","Sat"
  ];

  let date = new Date();

  // add days automatically
  date.setDate(date.getDate() + days);

  let day = date.getDate();
  let month = months[date.getMonth()];
  let weekDay = daysName[date.getDay()];

  return `Delivery by ${day} ${month}, ${weekDay}`;
}
const speakers = [ 
 {id:417,name:"Bestor RGB",price:30000,img:"https://i.postimg.cc/DZHLrP7K/a44.jpg",type:"charger",desc:"Bestor rgb wired Gaming Headset",delivery:getDeliveryDate()},
 {id:406,name:"Pods",price:17000,img:"https://i.imgur.com/bSBbTan.jpeg",type:"charger",desc:"Swiss Pods Bluetooth Headset",delivery:getDeliveryDate()},
 {id:418,name:"PunnkFunnk",price:27500,img:"https://i.postimg.cc/T1k8N1H2/a45.jpg",type:"charger",desc:"PunkFunnk BattleKiller",delivery:getDeliveryDate()},
 {id:419,name:"Lexolt Astra",price:15000,img:"https://i.postimg.cc/3RnbY6j4/a46.jpg",type:"charger",desc:"Lexolt Astra 45ms",delivery:getDeliveryDate()},
 {id:411,name:"Motorola Moto",price:170000,img:"https://i.postimg.cc/nL965CYk/a37.jpg",type:"charger",desc:"Buds Loop TWS",delivery:getDeliveryDate()}
];

// FORMAT PRICE (TZS + comma)
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString();
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY FUNCTION
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// SEARCH FUNCTION
function search(value){
 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );
 draw(filtered);
}

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
