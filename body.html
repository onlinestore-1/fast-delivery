<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gloves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:10px;
 color:white;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

 .title{
 flex:1;
 font-size:16px;
 font-weight:bold;
}

/* SMALL GAP */
.section-title{
 padding:6px 10px;
 margin:0;
 font-size:18px;
}

/* THIS PRODUCT (2 COLUMN) */
.two-grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

/* HORIZONTAL SCROLL ROW */
.scroll-row{
 display:flex;
 overflow-x:auto;
 gap:12px;
 padding:10px;
}
.scroll-row::-webkit-scrollbar{
 display:none;
}

.scroll-card{
 min-width:130px;
 max-width:130px;
 background:#fff;
 border-radius:8px;
 padding:8px;
 flex-shrink:0;
 text-align:center;
}

.scroll-card img{
 width:100%;
 height:100px;
 object-fit:cover;
 border-radius:6px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}
.card img{width:100%}
</style>
</head>

<body>

<!-- SEARCH + CART -->
 <div class="topbar">
  <span onclick="history.back()" style="font-size:22px;cursor:pointer;">←</span>

  <h3 class="title">Continue Your Shopping</h3>

  <span style="font-size:20px;cursor:pointer;" onclick="location.href='search.html'">🔍</span>
  <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

 <!-- THIS PRODUCT -->
<h3 class="section-title">This Product</h3>
<div id="thisProduct" class="two-grid"></div>

<!-- SIMILAR PRODUCTS -->
<h3 class="section-title">Similar Products</h3>
<div id="similar" class="scroll-row"></div>

<!-- EXPLORE SIMILAR TRENDS -->
<h3 class="section-title">Explore Similar Trends</h3>
<div id="trending" class="scroll-row"></div>

<script>
// FORMAT DELIVERY DATE
function getDeliveryDate(days = 0){

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  const daysName = [
    "Sun","Mon","Tue","Wed","Thu","Fri","Sat"
  ];

  let date = new Date();

  // add days automatically
  date.setDate(date.getDate() + days);

  let day = date.getDate();
  let month = months[date.getMonth()];
  let weekDay = daysName[date.getDay()];

  return `Delivery by ${day} ${month}, ${weekDay}`;
}
const speakers = [
 {id:200,name:"Doffi 500g",price:1000,img:"https://i.imgur.com/wpJjs0L.jpeg",type:"sabuni",delivery:getDeliveryDate()},
 {id:201,name:"OMO 200g",price:1600,img:"https://i.imgur.com/v0eeorr.jpeg",type:"sabuni",desc:"Ondoa madoa sugu",delivery:getDeliveryDate()},
 {id:202,name:"Doffi pink 500g",price:1000,img:"https://i.postimg.cc/KvhDYFPG/muh6.jpg/200",type:"sabuni",desc:"Washing powder",delivery:getDeliveryDate()},
 {id:203,name:"Niceone 180g",price:450,img:"https://i.imgur.com/7nmPGbq.jpeg/200",type:"sabuni",desc:"Ondoa madoa sugu",delivery:getDeliveryDate()},
 {id:204,name:"Jet 5ltr",price:10200,img:"https://i.imgur.com/OoGiHtj.jpeg",type:"sabuni",desc:"Dish washing liquid soap",delivery:getDeliveryDate()},
 {id:205,name:"Toss 500g",price:3800,img:"https://i.postimg.cc/fWdCn33J/toss1.jpg",type:"sabuni",desc:"Blue Washing Powder",delivery:getDeliveryDate()},
 {id:206,name:"Freedom Counter Book 2Q",price:1500,img:"https://i.postimg.cc/50JG0SpM/free1.jpg",type:"book",desc:"Freedom Counter Book-2 Quire",delivery:getDeliveryDate()},
 {id:207,name:"Famire Hair removal",price:4000,img:"https://i.postimg.cc/4yFNKWrD/ab27.jpg",type:"oil",desc:"Famire Hair Removal Spray for Men and Women",delivery:getDeliveryDate()},
 {id:208,name:"Exercise Book",price:700,img:"https://i.imgur.com/AQrSAGW.jpeg/200",type:"book",desc:"Daftari mistali mikubwa na midogo",delivery:getDeliveryDate()},
 {id:209,name:"Exercise Book",price:300,img:"https://i.imgur.com/ihIcg3h.jpeg/200",type:"book",desc:"Daftari la kuandikia page 100",delivery:getDeliveryDate()},
 {id:210,name:"Exercise Book",price:300,img:"https://i.imgur.com/Hg8Aeea.jpeg/200",type:"book",desc:"Daftari la kuandikia page 32",delivery:getDeliveryDate()},
 {id:211,name:"Sneakers",price:22000,img:"https://i.postimg.cc/XqdgtpTs/a17.jpg",type:"kids",desc:"G & D kids Running Shoes",delivery:getDeliveryDate()},
 {id:212,name:"Colgate 140g",price:3900,img:"https://i.postimg.cc/2547hzTB/a1.jpg/200",type:"tooth",desc:"With The Cool Mint Flavour",delivery:getDeliveryDate()},
 {id:213,name:"Rungu Spray 500ml",price:5000,img:"https://i.postimg.cc/WpCbGHdx/muh16.jpg/200",type:"ziada",desc:"Rungu Mosquito Spray",delivery:getDeliveryDate()},
 {id:214,name:"Abros Barisal Black",price:24000,img:"https://i.postimg.cc/gJh5cB3N/a15.jpg/200",type:"kids",desc:"Viatu vya watoto wadogo",delivery:getDeliveryDate()},
 {id:215,name:"Abros Barisal",price:22000,img:"https://i.postimg.cc/kGncrjsW/a16.jpg/200",type:"kids",desc:"Sneakers for Boys & Girls",delivery:getDeliveryDate()},
 {id:216,name:"Kats Lace Snakers",price:14000,img:"https://i.postimg.cc/sxXh9bws/a13.jpg/200",type:"kids",desc:"Viatu vya watoto",delivery:getDeliveryDate()},
 {id:217,name:"Redgettim Black Hair 300ml",price:6500,img:"https://i.postimg.cc/QtKJHz9p/ab29.jpg/200",type:"oil",desc:"Redgettim Black Hair Shampoo",delivery:getDeliveryDate()},
 {id:218,name:"Black Hair Shampoo 200ml",price:20000,img:"https://i.postimg.cc/htmy5fPT/ab28.jpg/200",type:"oil",desc:"Black Hair Shampoo",delivery:getDeliveryDate()},
 {id:219,name:" Hiper Razor",price:1000,img:"https://i.postimg.cc/Pq5jsWLS/muh23.jpg/200",type:"oil",desc:"Plus disposable Razor",delivery:getDeliveryDate()},
 {id:220,name:"Whitedent 40g",price:900,img:"https://i.imgur.com/U3VDK5W.jpeg/200",type:"tooth",desc:"Whitedent Herbal",delivery:getDeliveryDate()}
];

// FORMAT PRICE (TZS + comma)
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString() + "/=";
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

 function drawThisProduct(){
 let selected = speakers.slice(0,2);

 document.getElementById("thisProduct").innerHTML =
  selected.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>${formatPrice(p.price)}</b>
   </div>
  `).join("");
}

 let similarIds = []; // store IDs used in Similar

function drawSimilar(){

  // shuffle all products
  let shuffled = [...speakers].sort(()=>0.5 - Math.random());

  // pick 7
  let selected = shuffled.slice(0,7);

  // store their IDs
  similarIds = selected.map(p => p.id);

  document.getElementById("similar").innerHTML =
    selected.map(p=>`
      <div class="scroll-card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <p>${p.name}</p>
        <b>${formatPrice(p.price)}</b>
      </div>
    `).join("");
}


function drawTrending(){

  // ❌ REMOVE products already used in Similar
  let remaining = speakers.filter(p => !similarIds.includes(p.id));

  // shuffle remaining only
  let shuffled = [...remaining].sort(()=>0.5 - Math.random());

  // pick 6
  let selected = shuffled.slice(0,6);

  document.getElementById("trending").innerHTML =
    selected.map(p=>`
      <div class="scroll-card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <p>${p.name}</p>
        <b>${formatPrice(p.price)}</b>
      </div>
    `).join("");
}

// SEARCH FUNCTION
function search(value){
 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );
 draw(filtered);
}

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}

drawThisProduct();
drawSimilar();
drawTrending();

/* AUTO UPDATE */
 setInterval(()=>{
 drawSimilar();   // must run first
 drawTrending();  // uses filtered data
},60000);
</script>

</body>
</html>
