<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wireless</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:60px;
}

/* TOP BAR */
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:12px 10px;
 color:white;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}

/* LEFT SIDE */
.back-area{
 display:flex;
 align-items:center;
 gap:6px;
 cursor:pointer;
 font-size:15px;
 font-weight:bold;
}

.back-arrow{
 font-size:22px;
}

/* RIGHT SIDE */
.top-icons{
 display:flex;
 align-items:center;
 gap:18px;
}

.icon{
 font-size:22px;
 cursor:pointer;
}

/* HEADING */
.page-title{
 padding:4px 10px 2px;
 margin:0;
 font-size:22px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:4px 10px 10px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}

.card img{
 width:100%;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

 <!-- LEFT -->
 <div class="back-area" onclick="location.href='index.html'">
  <span class="back-arrow">←</span>
  <span>Continue Shopping</span>
 </div>

 <!-- RIGHT -->
 <div class="top-icons">
  <span class="icon" onclick="location.href='search.html'">🔍</span>
  <span class="icon" onclick="location.href='cart.html'">🛒</span>
 </div>

</div>

<h2 class="page-title">Home & Away Kit</h2>

<div id="box" class="grid"></div>

<script>
// FORMAT DELIVERY DATE
function getDeliveryDate(days = 7){

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  const daysName = [
    "Sun","Mon","Tue","Wed","Thu","Fri","Sat"
  ];

  let date = new Date();

  // add days automatically
  date.setDate(date.getDate() + days);

  let day = date.getDate();
  let month = months[date.getMonth()];
  let weekDay = daysName[date.getDay()];

  return `Delivery by ${day} ${month}, ${weekDay}`;
}
const speakers = [
 {id:38,name:"Liverpool",price:27000,img:"https://i.postimg.cc/RCG1DnbG/liva1.jpg",type:"jezi",desc:"Liverpool Home Kit 2025/26",delivery:getDeliveryDate()},
 {id:31,name:"Arsenal",price:27000,img:"https://i.postimg.cc/DfqfvrKf/ars1.jpg",type:"jezi",desc:"Arsenal Home Kit 2025/26",delivery:getDeliveryDate()},
 {id:32,name:"Arsenal",price:27000,img:"https://i.postimg.cc/x8gWkT5Y/ars2.jpg",type:"jezi",desc:"Arsenal Third Kit 2025/26",delivery:getDeliveryDate()},
 {id:47,name:"psg Home",price:27000,img:"https://i.postimg.cc/Sx9yW3Ch/ab3.jpg",type:"jezi",desc:"psg Home Kit 2025/26",delivery:getDeliveryDate()},
 {id:48,name:"psg Away",price:27000,img:"https://i.postimg.cc/0QQFCKFt/ab2.jpg",type:"jezi",desc:"psg Kit 2025/26",delivery:getDeliveryDate()},
 {id:30,name:"Manchester United",price:27000,img:"https://i.postimg.cc/D0f5GjC9/dr12.jpg",type:"jezi",desc:"Manchester United Home Kit 2025/26",delivery:getDeliveryDate()},
 {id:33,name:"Manchester City",price:27000,img:"https://i.postimg.cc/vT9tjP1f/sport2.jpg",type:"jezi",desc:"Manchester City Home Shirt 25/26",delivery:getDeliveryDate()},
 {id:34,name:"Manchester United",price:27000,img:"https://i.postimg.cc/nLkDmH6x/dr11.jpg",type:"jezi",desc:"Manchester United Away Kit 2025/26",delivery:getDeliveryDate()},
 {id:35,name:"Atlético Madrid",price:27000,img:"https://i.postimg.cc/kGz2FDJ2/dr7.jpg",type:"jezi",desc:"Atlético Madrid 2025/26",delivery:getDeliveryDate()},
 {id:36,name:"Atlético Madrid",price:27000,img:"https://i.postimg.cc/N0nLw5XC/dr4.jpg",type:"jezi",desc:"Atlético Madrid 2025/26",delivery:getDeliveryDate()},
 {id:37,name:"Tanzania",price:27000,img:"https://i.postimg.cc/8kxk47Q0/aa64.jpg",type:"jezi",desc:"Tanzania jersey",delivery:getDeliveryDate()}
];

// FORMAT PRICE
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString();
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY PRODUCTS
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
