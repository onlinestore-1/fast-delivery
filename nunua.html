<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Speakers</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:linear-gradient(180deg, #87c7f3, #a8d8f8);
 padding:10px;
 color:white;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

  box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}
.card img{width:100%}
</style>
</head>

<body>

<!-- SEARCH + CART -->
<div class="topbar">
 <input type="search" placeholder="Search products..." onkeyup="search(this.value)">
 <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

<h2 style="padding:10px">Speakers</h2>
<div id="box" class="grid"></div>

<script>
const speakers = [
 {id:800,name:"Mini Boost",price:35000,img:"https://i.imgur.com/DKQ0LxO.jpeg",desc:"Portable speaker",cat:"Speakers"},
 {id:801,name:"Samsung Mix",price:55000,img:"https://i.imgur.com/6ZJ4nZy.jpeg",desc:"Deep bass speaker",cat:"Speakers"},
 {id:802,name:"Fitric M3",price:42000,img:"https://i.imgur.com/VZ9z9lL.jpeg",desc:"Wireless speaker",cat:"Speakers"},
 {id:803,name:"JBL Go",price:38000,img:"https://i.imgur.com/jxZpFfK.jpeg",desc:"Mini powerful sound",cat:"Speakers"},
 {id:804,name:"Royco",price:14000,img:"https://i.imgur.com/rmXvXwO.jpeg/200",cat:"Chakula & afya"},
 {id:805,name:"Sukari 1kg",price:30000,img:"https://i.imgur.com/1EFgnRl.jpeg"}
];

// FORMAT PRICE (TZS + comma)
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString();
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY FUNCTION
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// SEARCH FUNCTION
function search(value){
 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );
 draw(filtered);
}

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
