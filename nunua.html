<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wireless</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:60px;
}

/* TOP BAR */
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:white;
 padding:12px 10px;
 color:black;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}

/* LEFT SIDE */
.back-area{
 display:flex;
 align-items:center;
 gap:6px;
 cursor:pointer;
 font-size:15px;
 font-weight:bold;
}

.back-arrow{
 font-size:22px;
}

/* RIGHT SIDE */
.top-icons{
 display:flex;
 align-items:center;
 gap:18px;
}

.icon{
 font-size:22px;
 cursor:pointer;
}

/* HEADING */
.page-title{
 padding:4px 10px 2px;
 margin:0;
 font-size:22px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:4px 10px 10px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}

.card img{
 width:100%;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

 <!-- LEFT -->
 <div class="back-area" onclick="location.href='index.html'">
  <span class="back-arrow">←</span>
  <span>Continue Shopping</span>
 </div>

 <!-- RIGHT -->
 <div class="top-icons">
  <span class="icon" onclick="location.href='search.html'">🔍</span>
  <span class="icon" onclick="location.href='cart.html'">🛒</span>
 </div>

</div>

<h2 class="page-title">Best Offer</h2>

<div id="box" class="grid"></div>

<script>
const speakers = [
 {id:130,name:"Swahili Honey 500g",price:9000,img:"https://i.postimg.cc/kGR0Gv8Z/ab48.jpg/200",type:"extra",desc:"Swahili Honey",delivery:"Delivery by 20 May, Wed"},
 {id:131,name:"Blue Band 450g",price:5000,img:"https://i.postimg.cc/BvqtFXmw/blue-ban1.jpg/200",type:"extra",desc:"Blue Band Original 450g",delivery:"Delivery by 20 May, Wed"},
 {id:132,name:"Swahili Honey 300g",price:5100,img:"https://i.postimg.cc/PqJGwHks/ab49.jpg/200",type:"extra",desc:"Swahili Honey",delivery:"Delivery by 20 May, Wed"},
 {id:120,name:"Korie(3ltr)",price:16150,img:"https://i.postimg.cc/76vjPdmk/ab32.jpg",type:"mafuta",delivery:"Delivery by 20 May, Wed"},
 {id:121,name:"Korie(900ml)",price:5250,img:"https://i.postimg.cc/zDKdhVhJ/kori4.jpg",type:"mafuta",desc:"Korie Cooking Oil",delivery:"Delivery by 20 May, Wed"},
 {id:122,name:"Royco mchuzi mix(200g)",price:2200,img:"https://i.postimg.cc/13LjR2gC/royco1.jpg",type:"masala",desc:"Spicy Beef Flavour",delivery:"Delivery by 20 May, Wed"},
 {id:123,name:"Chicken Masala(100g)",price:2850,img:"https://i.postimg.cc/DzRb8VLY/chic-mas1.jpg",type:"masala",desc:"Spice Seasoning",delivery:"Delivery by 20 May, Wed"},
 {id:124,name:"Baking Powder(100g)",price:750,img:"https://i.postimg.cc/NfPGg61d/bakin1.jpg",type:"masala",desc:"Kwa Mandazi Baking Powder",delivery:"Delivery by 20 May, Wed"},
 {id:125,name:"Red Gold(400g)",price:1750,img:"https://i.postimg.cc/636F2SKZ/red-gol1.jpg",type:"masala",desc:"Red Gold Tomato Paste",delivery:"Delivery by 20 May, Wed"},
 {id:126,name:"Tea Masala(100g)",price:4250,img:"https://i.postimg.cc/dVH5N1Pb/tea-mas1.jpg",type:"masala",desc:"Spice seasoning",delivery:"Delivery by 20 May, Wed"},
 {id:127,name:"Pilau Masala(100g)",price:6050,img:"https://i.postimg.cc/5tQSPSmq/pilau-masa.jpg",type:"masala",desc:"Spice seasoning",delivery:"Delivery by 20 May, Wed"},
 {id:128,name:"White Vinegar 965ml",price:1150,img:"https://i.postimg.cc/9FN9vq0v/red-ven.jpg",type:"masala",desc:"RedGold White Vinegar ",delivery:"Delivery by 20 May, Wed"},
 {id:129,name:"Blue Band 100g",price:1300,img:"https://i.postimg.cc/k461vX42/ab47.jpg/200",type:"extra",desc:"Blue Band 100g",delivery:"Delivery by 20 May, Wed"}
];

// FORMAT PRICE
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString();
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY PRODUCTS
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
