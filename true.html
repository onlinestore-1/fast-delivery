<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gloves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:white;
 padding:10px;
 color:black;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

 .title{
 flex:1;
 font-size:16px;
 font-weight:bold;
}

/* SMALL GAP */
.section-title{
 padding:6px 10px;
 margin:0;
 font-size:18px;
}

/* THIS PRODUCT (2 COLUMN) */
.two-grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

/* HORIZONTAL SCROLL ROW */
.scroll-row{
 display:flex;
 overflow-x:auto;
 gap:12px;
 padding:10px;
}
.scroll-row::-webkit-scrollbar{
 display:none;
}

.scroll-card{
 min-width:130px;
 max-width:130px;
 background:#fff;
 border-radius:8px;
 padding:8px;
 flex-shrink:0;
 text-align:center;
}

.scroll-card img{
 width:100%;
 height:100px;
 object-fit:cover;
 border-radius:6px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}
.card img{width:100%}
</style>
</head>

<body>

<!-- SEARCH + CART -->
 <div class="topbar">
  <span onclick="history.back()" style="font-size:22px;cursor:pointer;">←</span>

  <h3 class="title">Continue Your Shopping</h3>

  <span style="font-size:20px;cursor:pointer;" onclick="location.href='search.html'">🔍</span>
  <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

 <!-- THIS PRODUCT -->
<h3 class="section-title">Brand New Mobile</h3>
<div id="thisProduct" class="two-grid"></div>

 <script>
const speakers = [
 {id:309,name:"Google Pixel 6a",price:390000,img:"https://i.imgur.com/OrdCEN6.jpeg",type:"google",desc:"Google Pixel 6a 128GB Gray"},
 {id:306,name:"Infinix Hot 60 Pro+",price:350000,img:"https://i.imgur.com/hvMxIYZ.jpeg",type:"infinix",desc:"infinix hot 60 pro plus 128GB 8RAM"},
 {id:307,name:"Redmi 15C Black",price:350000,img:"https://i.imgur.com/1vZm3wE.jpeg",type:"xiaomi",desc:"Xiaomi Redmi 15C 8gb 256GB Midnight black"},
 {id:300,name:"Samsung Galaxy Black",price:480000,img:"https://i.postimg.cc/hG4NXd49/sam6.jpg",type:"samsung",desc:"Samsung Galaxy Note 20 Ultra 128Gb Black"},
 {id:301,name:"Samsung Galaxy Pink",price:480000,img:"https://i.postimg.cc/VN44pZ8H/sam2.jpg",type:"samsung",desc:"Samsung Galaxy Note 20 Ultra 128Gb pink"},
 {id:302,name:"Samsung Galaxy White",price:480000,img:"https://i.postimg.cc/yNCwsb2s/sam3.jpg",type:"samsung",desc:"Samsung Galaxy Note 20 Ultra 128Gb white"},
 {id:303,name:"Apple iphone 15 Pro Max",price:2200000,img:"https://i.imgur.com/1eGOscP.jpeg",type:"apple",desc:"New Apple iphone 15 Pro Max 256GB Gray"},
 {id:304,name:"Apple iphone 13 pro",price:1180000,img:"https://i.imgur.com/CoMUqoa.jpeg",type:"apple",desc:"New Apple iphone 13 Pro 128GB Sierra Blue"},
 {id:305,name:"Infinix Note 50 Pro",price:680000,img:"https://i.imgur.com/n6N2S5v.jpeg",type:"infinix",desc:"New infinix Note 50 Pro 256GB"},
 {id:308,name:"Redmi 14C Black",price:280000,img:"https://i.imgur.com/0JHAHqQ.jpeg",type:"xiaomi",desc:"New Xiaomi Redmi 14c 4GB 128GB Black"},
 {id:310,name:"Sony Xperia 10 iii",price:260000,img:"https://i.imgur.com/xdWEj8z.jpeg",type:"sony",desc:"Used Sony Xperia 10 iii ROM 128GB RAM 6GB"}
];

// FORMAT PRICE
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString() + "/=";
}

// DRAW PRODUCTS
function drawThisProduct(){

 document.getElementById("thisProduct").innerHTML =
  speakers.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>${formatPrice(p.price)}</b>
   </div>
  `).join("");
}

// SEARCH FUNCTION
function search(value){

 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );

 document.getElementById("thisProduct").innerHTML =
  filtered.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>${formatPrice(p.price)}</b>
   </div>
  `).join("");
}

// OPEN PRODUCT PAGE
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}

// LOAD PRODUCTS
drawThisProduct();
</script>

</body>
</html>
