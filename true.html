<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wireless</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:60px;
}

/* TOP BAR */
.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:white;
 padding:12px 10px;
 color:black;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}

/* LEFT SIDE */
.back-area{
 display:flex;
 align-items:center;
 gap:6px;
 cursor:pointer;
 font-size:15px;
 font-weight:bold;
}

.back-arrow{
 font-size:22px;
}

/* RIGHT SIDE */
.top-icons{
 display:flex;
 align-items:center;
 gap:18px;
}

.icon{
 font-size:22px;
 cursor:pointer;
}

/* HEADING */
.page-title{
 padding:4px 10px 2px;
 margin:0;
 font-size:22px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:4px 10px 10px;
}

.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}

.card img{
 width:100%;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

 <!-- LEFT -->
 <div class="back-area" onclick="location.href='index.html'">
  <span class="back-arrow">←</span>
  <span>Continue Shopping</span>
 </div>

 <!-- RIGHT -->
 <div class="top-icons">
  <span class="icon" onclick="location.href='search.html'">🔍</span>
  <span class="icon" onclick="location.href='cart.html'">🛒</span>
 </div>

</div>

<h2 class="page-title">Brand New Mobile</h2>

<div id="box" class="grid"></div>

<script>
const speakers = [
 {id:71,name:"Styli Dress",price:48000,img:"https://i.postimg.cc/RFrY6Rbp/dr1.jpg",type:"dress",desc:"Women Abstract Printed Short Sleeve Dress"},
 {id:60,name:"Street9",price:21000,img:"https://i.postimg.cc/c1M2wk6T/ab34.jpg",
 imgs:[
   "https://i.postimg.cc/c1M2wk6T/ab34.jpg",
   "https://i.postimg.cc/qBDMVGdf/ab36.jpg",
   "https://i.postimg.cc/vmSbFQJG/ab35.jpg"
 ],type:"dress",desc:"Women Embellished Scoop-Neck"},
{id:61,name:"Draax Fashions",price:20000,img:"https://i.postimg.cc/XNKNX0F7/ab37.jpg",type:"dress",desc:"Graphic Dress"},
{id:62,name:"Pinacolada",price:13000,img:"https://i.postimg.cc/nczLWPjV/ab38.jpg",type:"dress",desc:"Graphic Dress"},
{id:63,name:"Arrabi",price:25000,img:"https://i.postimg.cc/pTz0RCmj/ab39.jpg",type:"dress",desc:"Floral Embellished Burkha"},
{id:64,name:"Blue Off-shoulder",price:67000,img:"https://i.postimg.cc/GpKM2Krb/ab40.jpg",type:"dress",desc:"Light Blue Off Shoulder Gown"},
{id:65,name:"Brown Cotton Belt",price:47000,img:"https://i.postimg.cc/YCM2B2S7/ab41.jpg",type:"dress",desc:"Cotton Belted Shirt dress"},
{id:66,name:"Outry by Azorte",price:46000,img:"https://i.postimg.cc/MKhR7Qts/ab42.jpg",type:"dress",desc:"Embroidered Scoop-Neck A-Line Dress"},
{id:67,name:"Beige Safari",price:47000,img:"https://i.postimg.cc/zv2Qtj3W/ab43.jpg",type:"dress",desc:"Cotton Belted Shirt dress"},
{id:68,name:"Bhumifab",price:24000,img:"https://i.postimg.cc/HkTgrSXm/ab44.jpg",type:"dress",desc:"Women Printed Gown Dress"},
{id:69,name:"Nyrika",price:33000,img:"https://i.postimg.cc/kGdnf76v/ab45.jpg",type:"dress",desc:"Women Embroidery Flared Kurta Set"},
{id:70,name:"BHUMIFAB LONG",price:42000,img:"https://i.postimg.cc/NMd3rY6N/ab46.jpg",type:"dress",desc:"Women Printed Gown Dress"},
{id:72,name:"V-neck Orchid Blues",price:34000,img:"https://i.postimg.cc/HWFtpxRP/dr2.jpg",type:"dress",desc:"Women V-Neck Bodycon Dress"},
{id:73,name:"Orchid Blues dress",price:33000,img:"https://i.postimg.cc/3xfNTybW/dr5.jpg",type:"dress",desc:"Women Shirt Dress with Front Slit"}
];

// FORMAT PRICE
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString();
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

// DISPLAY PRODUCTS
function draw(list){
 document.getElementById("box").innerHTML = list.map(p=>`
  <div class="card" onclick="openProduct(${p.id})">
   <img src="${p.img}">
   <p>${p.name}</p>
   <b>${formatPrice(p.price)}</b>
  </div>
 `).join("");
}

// INITIAL LOAD
draw(speakers);

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}
</script>

</body>
</html>
