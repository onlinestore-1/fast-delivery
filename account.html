<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f1f3f6;
}

/* HEADER */
.header {
  background: #fff;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  align-items: center;
}

/* SECTION */
.section {
  background: #fff;
  margin-top: 10px;
  padding: 15px;
}

/* PRODUCTS ROW */
 .products {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.products::-webkit-scrollbar{
  display:none;
}

.product {
  min-width: 100px;   /* 10 items visible */
  max-width: 100px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  flex-shrink: 0;
}

.product img {
  width: 80px;
  height: 80px;
  object-fit: cover;
}

/* LANGUAGE BUTTONS */
.lang-btn {
  border: 1px solid #ccc;
  padding: 6px 12px;
  border-radius: 20px;
  margin-right: 10px;
  cursor: pointer;
}

/* LIST ITEMS */
.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.list-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.footer {
  background: #fff;
  margin-top: 10px;
  padding: 15px;
}

.footer div {
  padding: 8px 0;
  cursor: pointer;
}

/* BOTTOM NAVBAR */
.bottom-nav{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-around;
 align-items:center;
 border-top:1px solid #ddd;
 z-index:1000;
}

.bottom-nav a{
 text-decoration:none;
 text-align:center;
 font-size:12px;
 color:#777;
}

.bottom-nav i{
 display:block;
 font-size:20px;
 margin-bottom:3px;
}

/* ACTIVE PAGE (BLUE) */
.bottom-nav .active{
 color:#2874f0;
 font-weight:bold;
}

/* PREVENT CONTENT HIDING */
body{
 padding-bottom:70px;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
  <i class="fa fa-arrow-left" onclick="goHome()" style="cursor:pointer"></i>
  &nbsp;
  <span id="accountText">Account</span>
</div>

<!-- RECENTLY VIEWED -->
<div class="section">
 <h3 id="recentText">Suggested For You</h3>
<div class="products" id="suggestedProducts"></div>
</div>

<!-- LANGUAGE -->
<div class="section">
  <h3 id="langTitle">Try Plus+ Online in your language</h3>

  <span class="lang-btn" onclick="setLanguage('sw')">Swahili</span>
  <span class="lang-btn" onclick="setLanguage('en')">English</span>
</div>

<!-- ACCOUNT SETTINGS -->
<div class="section">
  <h3 id="settingsText">Account Settings</h3>

  <div class="list-item" onclick="location.href='language.html'">
    <div class="list-left">
      <i class="fa fa-language"></i>
      <span id="selectLang">Select Language</span>
    </div>
    <i class="fa fa-chevron-right"></i>
  </div>

  <div class="list-item" onclick="location.href='notifications.html'">
    <div class="list-left">
      <i class="fa fa-bell"></i>
      <span id="notifyText">Notification Settings</span>
    </div>
    <i class="fa fa-chevron-right"></i>
  </div>

  <div class="list-item" onclick="location.href='help.html'">
    <div class="list-left">
      <i class="fa fa-headset"></i>
      <span id="helpText">Help Center</span>
    </div>
    <i class="fa fa-chevron-right"></i>
  </div>
</div>

<!-- EARN -->
<div class="section">
  <h3 id="earnText">Earn with Plus+ Online</h3>

  <div class="list-item" onclick="location.href='sell.html'">
    <div class="list-left">
      <i class="fa fa-store"></i>
      <span id="sellText">Sell on Plus+ Online</span>
    </div>
    <i class="fa fa-chevron-right"></i>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div onclick="location.href='terms.html'" id="termsText">Terms</div>
  <div onclick="location.href='policies.html'" id="policyText">Policies</div>
  <div onclick="location.href='faq.html'" id="faqText">Browse FAQs</div>
</div>

<script>
const container = document.getElementById("suggestedProducts");

function showSuggestedProducts(){

  let allProducts = JSON.parse(localStorage.getItem("allProducts")) || [];

  // shuffle products randomly
  let shuffled = [...allProducts].sort(() => 0.5 - Math.random());

  // pick 10 products
  let selected = shuffled.slice(0, 10);

  container.innerHTML = selected.map(p => `
    <div class="product" onclick="openProduct(${p.id})">
      <img src="${p.img}">
      <div>${p.name}</div>
    </div>
  `).join("");

  if(selected.length === 0){
    container.innerHTML = "<p>No products available</p>";
  }
}

function openProduct(id){
  localStorage.setItem("pid", id);
  location.href = "product.html";
}

/* =========================
   LANGUAGE SWITCH
========================= */
function setLanguage(lang){
  if(lang === "sw"){
    document.getElementById("accountText").innerText = "Akaunti";
    document.getElementById("recentText").innerText = "Uliyotazama Hivi Karibuni";
    document.getElementById("langTitle").innerText = "Jaribu Plus+ Online kwa lugha yako";
    document.getElementById("settingsText").innerText = "Mipangilio ya Akaunti";
    document.getElementById("selectLang").innerText = "Chagua Lugha";
    document.getElementById("notifyText").innerText = "Mipangilio ya Taarifa";
    document.getElementById("helpText").innerText = "Kituo cha Msaada";
    document.getElementById("earnText").innerText = "Pata na Plus+ Online";
    document.getElementById("sellText").innerText = "Uza kwenye Plus+ Online";
    document.getElementById("termsText").innerText = "Masharti";
    document.getElementById("policyText").innerText = "Sera";
    document.getElementById("faqText").innerText = "Maswali";
  } else {
    location.reload(); // reset to English
  }
}

function goHome(){
  location.href = "index.html";
}

// load on page open
window.addEventListener("load", showSuggestedProducts);
window.addEventListener("pageshow", showSuggestedProducts);

// auto refresh every 60 seconds
setInterval(showSuggestedProducts, 60000);

/* AUTO ACTIVE NAV */
function setActiveNav(){

  let path = window.location.pathname;

  if(path.includes("index.html") || path === "/" ){
    document.getElementById("nav-home").classList.add("active");
  }
  else if(path.includes("category") || path.includes("fashion")){
    document.getElementById("nav-category").classList.add("active");
  }
  else if(path.includes("account")){
    document.getElementById("nav-account").classList.add("active");
  }
  else if(path.includes("cart")){
    document.getElementById("nav-cart").classList.add("active");
  }
}

window.addEventListener("load", setActiveNav);
</script>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html" id="nav-home">
    <i class="fa fa-home"></i>
    Home
  </a>

  <a href="category.html" id="nav-category">
    <i class="fa fa-th-large"></i>
    Categories
  </a>

  <a href="account.html" id="nav-account">
    <i class="fa fa-user"></i>
    Account
  </a>

  <a href="cart.html" id="nav-cart">
    <i class="fa fa-shopping-cart"></i>
    Cart
  </a>

</div>

</body>
</html>
