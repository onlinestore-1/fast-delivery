<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<title>Gloves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f4f4f4;
 padding-top:70px;
}

/* TOP BAR */
.topbar{
 display:flex;
 align-items:center;
 background:white;
 padding:10px;
 color:black;
 gap:10px;

 position:fixed;
 top:0;
 left:0;
 width:100%;
 z-index:1000;

 box-sizing:border-box;
}
.topbar input{
 flex:1;
 padding:8px;
 border:none;
 border-radius:4px;
}
.cart{font-size:22px;cursor:pointer}

 .title{
 flex:1;
 font-size:16px;
 font-weight:bold;
}

/* SMALL GAP */
.section-title{
 padding:6px 10px;
 margin:0;
 font-size:18px;
}

/* THIS PRODUCT (2 COLUMN) */
.two-grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

/* HORIZONTAL SCROLL ROW */
.scroll-row{
 display:flex;
 overflow-x:auto;
 gap:12px;
 padding:10px;
}
.scroll-row::-webkit-scrollbar{
 display:none;
}

.scroll-card{
 min-width:130px;
 max-width:130px;
 background:#fff;
 border-radius:8px;
 padding:8px;
 flex-shrink:0;
 text-align:center;
}

.scroll-card img{
 width:100%;
 height:100px;
 object-fit:cover;
 border-radius:6px;
}

/* GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}
.card{
 background:#fff;
 padding:10px;
 border-radius:6px;
}
.card img{width:100%}
</style>
</head>

<body>

<!-- SEARCH + CART -->
 <div class="topbar">
  <span onclick="history.back()" style="font-size:22px;cursor:pointer;">←</span>

  <h3 class="title">Continue Your Shopping</h3>

  <span style="font-size:20px;cursor:pointer;" onclick="location.href='search.html'">🔍</span>
  <span class="cart" onclick="location.href='cart.html'">🛒</span>
</div>

 <!-- THIS PRODUCT -->
<h3 class="section-title">This Product</h3>
<div id="thisProduct" class="two-grid"></div>

<!-- SIMILAR PRODUCTS -->
<h3 class="section-title">Similar Products</h3>
<div id="similar" class="scroll-row"></div>

<!-- EXPLORE SIMILAR TRENDS -->
<h3 class="section-title">Explore Similar Trends</h3>
<div id="trending" class="scroll-row"></div>

<script>
// FORMAT DELIVERY DATE
function getDeliveryDate(days = 7){

  const months = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  const daysName = [
    "Sun","Mon","Tue","Wed","Thu","Fri","Sat"
  ];

  let date = new Date();

  // add days automatically
  date.setDate(date.getDate() + days);

  let day = date.getDate();
  let month = months[date.getMonth()];
  let weekDay = daysName[date.getDay()];

  return `Delivery by ${day} ${month}, ${weekDay}`;
}
const speakers = [
 {id:10,name:"Neonomad Urban",price:12500,img:"https://i.imgur.com/tpYrddJ.jpeg",type:"tshirt",desc:"Men Graphic Print Oversized",delivery:getDeliveryDate()},
 {id:9,name:"Black Neonomad Street ",price:12000,img:"https://i.imgur.com/zgyFKOe.jpeg",type:"tshirt",desc:"Men Graphic Print Oversized",delivery:getDeliveryDate()},
 {id:6,name:"TECHNOSPORT",price:13000,img:"https://i.imgur.com/EptkNxj.jpeg",type:"tshirt",desc:"Men Slim Fit T Shirt",delivery:getDeliveryDate()},
 {id:7,name:"Surprise Buda Jeans Co",price:10000,img:"https://i.imgur.com/DuPhNKu.jpeg",type:"tshirt",desc:"Men Graphic Print Regular Fit",delivery:getDeliveryDate()},
 {id:8,name:"Alfaq",price:15000,img:"https://i.imgur.com/unw4MV3.jpeg",type:"tshirt",desc:"Men Graphic Print Oversized",delivery:getDeliveryDate()},
 {id:11,name:"Buda Jeans Co Race",price:12500,img:"https://i.imgur.com/bBde034.jpeg",type:"tshirt",desc:"Men Graphic Oversized Fit",delivery:getDeliveryDate()},
 {id:12,name:"Black Neonomad",price:12000,img:"https://i.imgur.com/NDAoZAr.jpeg",type:"tshirt",desc:"Men Graphic Print Oversized Fit",delivery:getDeliveryDate()},
 {id:13,name:"Blue Buda Jeans Co",price:12000,img:"https://i.imgur.com/SSMbMl6.jpeg",type:"tshirt",desc:"Men Graphic Print Oversized Fit",delivery:getDeliveryDate()},
 {id:14,name:"lee cooper",price:10000,img:"https://i.imgur.com/3yuEsKY.jpeg",type:"tshirt",desc:"Men Brand Print oversized Fit",delivery:getDeliveryDate()},
 {id:15,name:"Yousta",price:6000,img:"https://i.imgur.com/3d3c22F.jpeg",type:"tshirt",desc:"Men Graphic Print Oversized Fit",delivery:getDeliveryDate()},
 {id:16,name:"Marvel Buda jeans Co",price:13000,img:"https://i.imgur.com/0kLhxU4.jpeg",type:"tshirt",desc:"Men Graphic Print Oversized Fit",delivery:getDeliveryDate()},
 {id:17,name:"T-Base",price:19000,img:"https://i.imgur.com/MkDOJUt.jpeg",type:"tshirt",desc:"Men Typographic Print Regular",delivery:getDeliveryDate()}
];

// FORMAT PRICE (TZS + comma)
function formatPrice(price){
 return "TZS " + Number(price).toLocaleString() + "/=";
}

// LOAD EXISTING PRODUCTS
let all = JSON.parse(localStorage.getItem("allProducts")) || [];

// MERGE WITHOUT DUPLICATES
speakers.forEach(sp => {
 if (!all.some(p => p.id === sp.id)) {
  all.push(sp);
 }
});

localStorage.setItem("allProducts", JSON.stringify(all));

 function drawThisProduct(){
 let selected = speakers.slice(0,2);

 document.getElementById("thisProduct").innerHTML =
  selected.map(p=>`
   <div class="card" onclick="openProduct(${p.id})">
    <img src="${p.img}">
    <p>${p.name}</p>
    <b>${formatPrice(p.price)}</b>
   </div>
  `).join("");
}

 let similarIds = []; // store IDs used in Similar

function drawSimilar(){

  // shuffle all products
  let shuffled = [...speakers].sort(()=>0.5 - Math.random());

  // pick 7
  let selected = shuffled.slice(0,7);

  // store their IDs
  similarIds = selected.map(p => p.id);

  document.getElementById("similar").innerHTML =
    selected.map(p=>`
      <div class="scroll-card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <p>${p.name}</p>
        <b>${formatPrice(p.price)}</b>
      </div>
    `).join("");
}


function drawTrending(){

  // ❌ REMOVE products already used in Similar
  let remaining = speakers.filter(p => !similarIds.includes(p.id));

  // shuffle remaining only
  let shuffled = [...remaining].sort(()=>0.5 - Math.random());

  // pick 6
  let selected = shuffled.slice(0,6);

  document.getElementById("trending").innerHTML =
    selected.map(p=>`
      <div class="scroll-card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <p>${p.name}</p>
        <b>${formatPrice(p.price)}</b>
      </div>
    `).join("");
}

// SEARCH FUNCTION
function search(value){
 const filtered = speakers.filter(p =>
  p.name.toLowerCase().includes(value.toLowerCase())
 );
 draw(filtered);
}

// OPEN PRODUCT
function openProduct(id){
 localStorage.setItem("pid", id);
 location.href = "product.html";
}

drawThisProduct();
drawSimilar();
drawTrending();

/* AUTO UPDATE */
 setInterval(()=>{
 drawSimilar();   // must run first
 drawTrending();  // uses filtered data
},60000);
</script>

</body>
</html>
