<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  padding-top:70px;
  padding-bottom:30px;
}

/* TOP BAR */
.top-bar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 15px;
  border-bottom:1px solid #ddd;
  z-index:1000;
}

.top-bar i{
  font-size:22px;
  cursor:pointer;
}

.top-bar h3{
  margin:0;
  font-size:18px;
}

/* ORDER CARD */
.order-card{
  background:#fff;
  margin:12px;
  border-radius:10px;
  padding:15px;
}

/* PRODUCT */
.product{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:20px;
}

.product img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:8px;
}

.product-info{
  flex:1;
}

.product-info h4{
  margin:0 0 5px;
}

.product-info p{
  margin:3px 0;
  color:#555;
}

/* TRACKING */
.timeline{
  position:relative;
  margin-left:10px;
  padding-left:30px;
}

.timeline::before{
  content:"";
  position:absolute;
  left:7px;
  top:0;
  width:3px;
  height:100%;
  background:#ddd;
}

.step{
  position:relative;
  margin-bottom:25px;
}

.step:last-child{
  margin-bottom:0;
}

.dot{
  position:absolute;
  left:-27px;
  top:5px;
  width:14px;
  height:14px;
  border-radius:50%;
  background:#ccc;
}

/* ACTIVE */
.step.active .dot{
  background:#1db954;
}

.step.active h5{
  color:#000;
}

/* PENDING */
.step.pending h5{
  color:#999;
}

.step h5{
  margin:0;
  font-size:15px;
}

.step p{
  margin:4px 0 0;
  color:#666;
  font-size:13px;
}

.empty{
  text-align:center;
  margin-top:80px;
  color:#777;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
  <i class="fa fa-arrow-left" onclick="history.back()"></i>
  <h3>My Orders</h3>
</div>

<!-- ORDERS -->
<div id="ordersBox"></div>

<script>

/* LOAD ORDERS */
let orders = JSON.parse(localStorage.getItem("orders")) || [];

const ordersBox = document.getElementById("ordersBox");

/* EMPTY */
if(orders.length === 0){

  ordersBox.innerHTML = `
    <div class="empty">
      <i class="fa fa-box" style="font-size:70px;color:#ccc;"></i>
      <h2>No Orders Yet</h2>
      <p>Your placed orders will appear here</p>
    </div>
  `;

}

/* SHOW LATEST FIRST */
orders.reverse();

/* LOOP */
orders.forEach((order,index)=>{

  /* HANDLE MULTIPLE ITEMS */
  let items = Array.isArray(order.items)
    ? order.items
    : [order.items];

  items.forEach(item=>{

    /* ORDER STATUS */
    let status = item.status || "placed";

    /* ACTIVE STEPS */
    const active = {
      placed:1,
      packed:2,
      shipped:3,
      delivery:4,
      delivered:5
    };

    let current = active[status] || 1;

    ordersBox.innerHTML += `

      <div class="order-card">

        <!-- PRODUCT -->
        <div class="product">

          <img src="${item.img}">

          <div class="product-info">
            <h4>${item.name}</h4>

            <p>
              TZS ${Number(item.price).toLocaleString()}/=
            </p>

            <p>Qty: ${item.qty}</p>

            ${
              item.size
              ? `<p>Size: ${item.size}</p>`
              : ""
            }

            <p style="color:#2874f0;font-weight:bold;">
              <i class="fa fa-truck"></i>
              ${item.delivery || "Delivery in progress"}
            </p>

          </div>
        </div>

        <!-- TIMELINE -->
        <div class="timeline">

          <!-- PLACED -->
          <div class="step ${current >= 1 ? "active":"pending"}">
            <div class="dot"></div>

            <h5>Order Placed</h5>

            <p>
              Your order has been placed successfully
            </p>
          </div>

          <!-- PACKED -->
          <div class="step ${current >= 2 ? "active":"pending"}">
            <div class="dot"></div>

            <h5>Packed</h5>

            <p>
              Seller is preparing your order
            </p>
          </div>

          <!-- SHIPPED -->
          <div class="step ${current >= 3 ? "active":"pending"}">
            <div class="dot"></div>

            <h5>Shipped</h5>

            <p>
              Your order has been shipped
            </p>
          </div>

          <!-- OUT FOR DELIVERY -->
          <div class="step ${current >= 4 ? "active":"pending"}">
            <div class="dot"></div>

            <h5>Out For Delivery</h5>

            <p>
              Delivery rider is on the way
            </p>
          </div>

          <!-- DELIVERED -->
          <div class="step ${current >= 5 ? "active":"pending"}">
            <div class="dot"></div>

            <h5>Delivered</h5>

            <p>
              Customer received the order
            </p>
          </div>

        </div>

      </div>

    `;
  });

});

</script>

</body>
</html>
