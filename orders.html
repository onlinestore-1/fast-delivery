<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <meta charset="UTF-8">
  <title>My Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:white;
      padding:10px;
    }

    header{
      background:white;
      color:black;
      padding:12px;
      text-align:center;
      font-size:18px;
    }

    .orders{
      max-width:600px;
      margin:auto;
    }

    .order{
      background:#fff;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      display:flex;
      gap:10px;
      align-items:center;
      cursor:pointer;
    }

    .order img{
      width:80px;
      height:80px;
      object-fit:cover;
      border-radius:6px;
    }

    .order-name{
      font-size:16px;
      font-weight:bold;
    }

    .empty{
      text-align:center;
      margin-top:40px;
      color:#777;
    }

    /* TOP BAR (LIKE IMAGE) */
.top-bar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 15px;
  border-bottom:1px solid #ddd;
  z-index:1000;
}

.top-bar span{
  font-size:22px;
  cursor:pointer;
}

.top-bar h3{
  margin:0;
  font-size:18px;
}

/* PUSH CONTENT DOWN */
body{
  padding-top:70px;
}

/* YOU MAY ALSO LIKE */
.like-section{
  margin-top:20px;
}

.like-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.like-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.like-card{
  background:#fff;
  border-radius:8px;
  padding:6px;
  text-align:center;
  cursor:pointer;
}

.like-card img{
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
}

.like-card p{
  font-size:12px;
  margin:4px 0;
}

/* BOTTOM NAVBAR */
.bottom-nav{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 height:60px;
 background:#fff;
 display:flex;
 justify-content:space-around;
 align-items:center;
 border-top:1px solid #ddd;
 z-index:1000;
}

.bottom-nav a{
 text-decoration:none;
 text-align:center;
 font-size:12px;
 color:#777;
}

.bottom-nav i{
 display:block;
 font-size:20px;
 margin-bottom:3px;
}

/* ACTIVE PAGE (BLUE) */
.bottom-nav .active{
 color:#2874f0;
 font-weight:bold;
}

/* PREVENT CONTENT HIDING */
body{
 padding-bottom:70px;
}
  </style>
</head>

<body>

<div class="top-bar">
  <span onclick="goHome()">&#8592;</span>
  <h3>Account</h3>
</div>

<div class="orders" id="ordersBox"></div>

<!-- YOU MAY ALSO LIKE -->
<div class="like-section">
  <div class="like-title">You May Also Like</div>
  <div id="likeBox" class="like-grid"></div>
</div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];
const box = document.getElementById("ordersBox");

if(orders.length === 0){
  box.innerHTML = `
    <div class="empty">
      <p>No orders yet</p>
    </div>
  `;
}

orders.forEach(o => {
  box.innerHTML += `
    <div class="order" onclick="rebuy(${o.id})">
      <img src="${o.img}">
      <div class="order-name">${o.name}</div>
    </div>
  `;
});

function rebuy(id){
  localStorage.setItem("pid", id);
  location.href = "product.html";
}

function openProduct(id){

  localStorage.setItem("pid", id);

  let viewed = JSON.parse(localStorage.getItem("lastViewed")) || [];

  viewed = viewed.filter(p => p != id);
  viewed.unshift(id);
  viewed = viewed.slice(0,10);

  localStorage.setItem("lastViewed", JSON.stringify(viewed));

  location.href = "product.html";
}

function formatPrice(price){
  return "TZS " + Number(price).toLocaleString() + "/=";
}

function showYouMayAlsoLike(){

  let products = JSON.parse(localStorage.getItem("allProducts")) || [];

  // shuffle like index
  let shuffled = [...products].sort(()=>0.5 - Math.random());

  // take ONLY 6
  let selected = shuffled.slice(0,6);

  document.getElementById("likeBox").innerHTML =
    selected.map(p=>`
      <div class="like-card" onclick="openProduct(${p.id})">
        <img src="${p.img}">
        <p>${p.name}</p>
        <b>${formatPrice(p.price)}</b>
      </div>
    `).join("");
}

function autoUpdateLike(){
  showYouMayAlsoLike();
}

window.addEventListener("load", autoUpdateLike);
window.addEventListener("pageshow", autoUpdateLike);
window.addEventListener("storage", autoUpdateLike);

/* optional refresh like homepage */
setInterval(showYouMayAlsoLike, 60000);

function goHome(){
  location.href = "index.html";
}

/* AUTO ACTIVE NAV */
function setActiveNav(){

  let path = window.location.pathname;

  if(path.includes("index.html") || path === "/" ){
    document.getElementById("nav-home").classList.add("active");
  }
  else if(path.includes("category") || path.includes("fashion")){
    document.getElementById("nav-category").classList.add("active");
  }
  else if(path.includes("account")){
    document.getElementById("nav-account").classList.add("active");
  }
  else if(path.includes("cart")){
    document.getElementById("nav-cart").classList.add("active");
  }
}

window.addEventListener("load", setActiveNav);
</script>

<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="index.html" id="nav-home">
    <i class="fa fa-home"></i>
    Home
  </a>

  <a href="category.html" id="nav-category">
    <i class="fa fa-th-large"></i>
    Categories
  </a>

  <a href="account.html" id="nav-account">
    <i class="fa fa-user"></i>
    Account
  </a>

  <a href="cart.html" id="nav-cart">
    <i class="fa fa-shopping-cart"></i>
    Cart
  </a>

</div>

</body>
</html>
